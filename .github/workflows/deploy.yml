name: Deploy Portfolio
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Upload to Azure
      uses: azure/CLI@v2
      with:
        azcliversion: latest
        inlineScript: |
           # This 'ls' command helps you see where you are in the logs
           echo "Listing files in current directory:"
           ls -R
           az storage blob upload-batch \
            --account-name sarastorageaccount2026 \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --destination '$web' \
            --source . \
            --overwrite true \
            --no-progress false 
