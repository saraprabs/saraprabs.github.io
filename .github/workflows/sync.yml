name: Sync README to Profile

on:
  push:
    branches:
      - main  # or master
    paths:
      - 'README.md'

jobs:
  copy-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Portfolio Repo
        uses: actions/checkout@v4

      - name: Pushes README to Profile Repo
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.SYNC_TOKEN }}
        with:
          source_file: 'README.md'
          destination_repo: 'saraprabs/saraprabs.github.io' # Replace with your repo
          destination_folder: '/'
          user_email: 'vsaranya04@gmail.com'
          user_name: 'saraprabs'
          commit_message: 'Syncing README from Portfolio'
